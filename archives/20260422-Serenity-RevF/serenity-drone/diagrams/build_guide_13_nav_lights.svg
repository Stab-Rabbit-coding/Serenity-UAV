<text x="776" y="305" text-anchor="middle" font-family="'Arial','Helvetica',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">2</text>
<text x="792" y="306" font-family="'Arial','Helvetica',sans-serif" font-size="10" fill="#222222">Port nacelle tip cap: press LED into 2×2mm recess → RED colour</text>
<circle cx="776" cy="325" r="9" fill="#006db7"/>
<text x="776" y="329" text-anchor="middle" font-family="'Arial','Helvetica',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">3</text>
<text x="792" y="330" font-family="'Arial','Helvetica',sans-serif" font-size="10" fill="#222222">Stbd nacelle tip cap: press LED into 2×2mm recess → GREEN colour</text>
<circle cx="776" cy="349" r="9" fill="#006db7"/>
<text x="776" y="353" text-anchor="middle" font-family="'Arial','Helvetica',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">4</text>
<text x="792" y="354" font-family="'Arial','Helvetica',sans-serif" font-size="10" fill="#222222">Engine bell aft ring: recess tail LED → WHITE</text>
<circle cx="776" cy="373" r="9" fill="#006db7"/>
<text x="776" y="377" text-anchor="middle" font-family="'Arial','Helvetica',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">5</text>
<text x="792" y="378" font-family="'Arial','Helvetica',sans-serif" font-size="10" fill="#222222">Dorsal hull 120mm: recess anti-collision LED → RED flash 60 FPM</text>
<circle cx="776" cy="397" r="9" fill="#006db7"/>
<text x="776" y="401" text-anchor="middle" font-family="'Arial','Helvetica',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">6</text>
<text x="792" y="402" font-family="'Arial','Helvetica',sans-serif" font-size="10" fill="#222222">Belly hull 160mm: recess strobe LED → WHITE flash 60 FPM</text>
<circle cx="776" cy="421" r="9" fill="#006db7"/>
<text x="776" y="425" text-anchor="middle" font-family="'Arial','Helvetica',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">7</text>
<text x="792" y="426" font-family="'Arial','Helvetica',sans-serif" font-size="10" fill="#222222">Nose underside 30mm: recess landing light → WHITE (ops only)</text>
<circle cx="776" cy="445" r="9" fill="#006db7"/>
<text x="776" y="449" text-anchor="middle" font-family="'Arial','Helvetica',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">8</text>
<text x="792" y="450" font-family="'Arial','Helvetica',sans-serif" font-size="10" fill="#222222">Daisy-chain 28AWG 3-core: Port→Stbd→Tail→Dorsal→Belly→Pico GP26</text>
