<text x="776" y="281" text-anchor="middle" font-family="'Arial','Helvetica',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">1</text>
<text x="792" y="282" font-family="'Arial','Helvetica',sans-serif" font-size="10" fill="#222222">Solder short leads to each WS2812C-2020 LED (keep polarity consistent)</text>
