<text x="776" y="351" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">3</text>
<text x="792" y="352" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Mount ESCs with foam tape + M2.5 screw through mounting tab</text>
