<text x="776" y="399" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">5</text>
<text x="792" y="400" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Install battery on keel rail · XT60 to PDB · lock with M3 thumb screw</text>
