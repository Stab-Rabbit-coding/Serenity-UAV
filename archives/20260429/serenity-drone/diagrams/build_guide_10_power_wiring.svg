<text x="776" y="423" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">6</text>
<text x="792" y="424" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">CONTINUITY CHECK: no shorts on +V to GND before connecting battery</text>
