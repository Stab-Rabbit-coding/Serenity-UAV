# Slic3r 1.3.0 — XYZprinting da Vinci Jr. 1.0 w — PLA Normal
# Serenity-Class UAV Rev P Prototype Print Profile
# Author: Steve Griffing, PE(CSE), CISSP-ISSEP, CPP
# License: CC BY 4.0
# Date: 2026-06-01
#
# Machine spec refs:
#   XYZprinting da Vinci Jr. 1.0 w datasheet (2024)
#   Build volume: 150 x 150 x 150 mm
#   Nozzle: 0.4 mm fixed, direct-drive, 1.75 mm PLA
#   No heated bed — glue stick adhesion
#   Firmware: Marlin derivative (XYZprinting OEM)
#
# G-code compatibility:
#   This profile generates RepRap-compatible G-code suitable for:
#   (a) da Vinci Jr. running Repetier firmware (direct USB/SD card use), or
#   (b) import into XYZware via File > Import G-code (firmware >= 3.1.x)
#   The .3w conversion wrapper (xyz_wrap.py) in this directory converts
#   the G-code header to XYZware WiFi format if needed.

# ------------------------------------------------------------------
# Machine geometry
# ------------------------------------------------------------------
bed_size = 150,150
print_center = 75,75
z_offset = 0

# ------------------------------------------------------------------
# Extruder / nozzle
# ------------------------------------------------------------------
nozzle_diameter = 0.4
filament_diameter = 1.75
extrusion_multiplier = 1.0
bridge_flow_ratio = 0.95

# ------------------------------------------------------------------
# Layer heights — "Normal" quality preset (0.2 mm)
# ------------------------------------------------------------------
layer_height = 0.2
first_layer_height = 0.3

# ------------------------------------------------------------------
# Perimeters (XYZware "Surface" = 2 shells → 2 perimeters)
# ------------------------------------------------------------------
perimeters = 2
top_solid_layers = 3
bottom_solid_layers = 3
seam_position = aligned

# ------------------------------------------------------------------
# Infill — batch-specific; override via --fill-density on CLI
# ------------------------------------------------------------------
fill_density = 20%
fill_pattern = honeycomb
top_infill_pattern = rectilinear
bottom_infill_pattern = rectilinear
infill_every_layers = 1

# ------------------------------------------------------------------
# Temperature — PLA, no heated bed
# ------------------------------------------------------------------
temperature = 200
first_layer_temperature = 205
bed_temperature = 0
first_layer_bed_temperature = 0

# ------------------------------------------------------------------
# Speeds — calibrated for da Vinci Jr. direct-drive
# ------------------------------------------------------------------
perimeter_speed = 45
small_perimeter_speed = 25
external_perimeter_speed = 35
infill_speed = 60
solid_infill_speed = 45
top_solid_infill_speed = 35
support_material_speed = 40
bridge_speed = 30
gap_fill_speed = 20
travel_speed = 130
first_layer_speed = 20

# ------------------------------------------------------------------
# Retraction — direct-drive extruder
# ------------------------------------------------------------------
retract_length = 2
retract_speed = 45
retract_restart_extra = 0
retract_before_travel = 2
retract_lift = 0.1

# ------------------------------------------------------------------
# Cooling — da Vinci Jr. has single part-cooling fan (auto)
# ------------------------------------------------------------------
cooling = 1
min_fan_speed = 35
max_fan_speed = 100
bridge_fan_speed = 100
disable_fan_first_layers = 2
fan_always_on = 0
slowdown_below_layer_time = 15
min_print_speed = 10

# ------------------------------------------------------------------
# Support — overridden per-batch on CLI
# ------------------------------------------------------------------
support_material = 0
support_material_threshold = 45
support_material_pattern = pillars
support_material_spacing = 2.5
support_material_angle = 0
support_material_contact_distance = 0.2
support_material_interface_layers = 2
support_material_interface_spacing = 0
support_material_buildplate_only = 0

# ------------------------------------------------------------------
# Raft — overridden per-batch on CLI (0 = off, 1+ = raft layers)
# ------------------------------------------------------------------
raft_layers = 0

# ------------------------------------------------------------------
# Skirt — single priming skirt, 3 mm from part
# ------------------------------------------------------------------
skirts = 1
skirt_distance = 3
skirt_height = 1
min_skirt_length = 0

# ------------------------------------------------------------------
# Start G-code — da Vinci Jr. / Marlin
# ------------------------------------------------------------------
start_gcode = G21 ; mm units\nG90 ; absolute coordinates\nM82 ; absolute extrusion\nG28 ; home all axes\nG1 Z5 F3000 ; raise nozzle 5 mm\nG1 X10 Y10 F5000 ; move to corner\nG1 Z0.3 F1500 ; descend to prime height\nG92 E0 ; reset extruder\nG1 X60 E9 F500 ; prime line 50 mm\nG92 E0 ; reset extruder after prime\nG1 Z1 F3000 ; lift before print

# ------------------------------------------------------------------
# End G-code
# ------------------------------------------------------------------
end_gcode = M104 S0 ; hotend off\nG91 ; relative\nG1 E-3 F1800 ; retract 3 mm\nG1 Z10 F3000 ; raise Z\nG90 ; absolute\nG1 X5 Y145 F5000 ; present part (front-left)\nM84 ; disable steppers
