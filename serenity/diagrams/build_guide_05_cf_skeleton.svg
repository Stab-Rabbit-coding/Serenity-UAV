<text x="616" y="434" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#607080">West System 105/206</text>
<text x="616" y="446" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#607080">Cure 12h before load</text>
