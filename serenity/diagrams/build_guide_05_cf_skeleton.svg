<text x="596" y="556" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#222222">M3 keel holes at:</text>
<text x="596" y="570" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#607080">95mm from nose</text>
<text x="596" y="580" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#607080">165mm from nose</text>
<text x="596" y="590" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#607080">235mm from nose</text>
