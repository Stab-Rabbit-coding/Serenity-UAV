<text x="781" y="224" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">1×</text>
<text x="800" y="224" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">West System 105/206 epoxy</text>
