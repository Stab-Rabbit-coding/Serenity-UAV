<text x="968" y="305" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="11" fill="#ffffff">INSTRUCTIONS</text>
<circle cx="776" cy="321" r="9" fill="#006db7"/>
<text x="776" y="325" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">1</text>
<text x="792" y="326" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Mix and apply epoxy to keel at hull attachment points (91,165,251,320,388mm)</text>
<circle cx="776" cy="345" r="9" fill="#006db7"/>
<text x="776" y="349" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">2</text>
<text x="792" y="350" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Slide keel through all hull sections — clamp and cure 12h</text>
<circle cx="776" cy="369" r="9" fill="#006db7"/>
<text x="776" y="373" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">3</text>
<text x="792" y="374" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Install wing spar pocket inserts at wing root station (165mm) — check 90° to keel</text>
<circle cx="776" cy="393" r="9" fill="#006db7"/>
<text x="776" y="397" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">4</text>
<text x="792" y="398" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Press-fit spar tenons into bracket · apply Loctite 638</text>
<circle cx="776" cy="417" r="9" fill="#006db7"/>
<text x="776" y="421" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">5</text>
<text x="792" y="422" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Verify symmetric span: measure span symmetry: measure tip-to-tip before cure</text>
<circle cx="776" cy="441" r="9" fill="#006db7"/>
<text x="776" y="445" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">6</text>
<text x="792" y="446" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Drill M3 pilot holes through keel at 95,165,235,295,360mm</text>
<rect x="760" y="490" width="416" height="36" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="778" y="505" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="14" fill="#ff7518">⚠</text><text x="796" y="512" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Do NOT bond cockpit cap or engine bell yet — must stay removable for electronics</text>
<rect x="760" y="534" width="416" height="32" rx="6" fill="#b2ebf2" stroke="#00838f" stroke-width="1.5"/><text x="770" y="548" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#00838f">ℹ</text><text x="786" y="554" font-family="'OpenDyslexic',sans-serif" font-size="9.5" fill="#222222">Spars should flex slightly — correct for crash absorption</text>
