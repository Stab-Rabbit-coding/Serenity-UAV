<text x="24" y="90" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="16" fill="#006db7">PHASE 2 — ASSEMBLE CF SKELETON</text>
<text x="500" y="90" font-family="'OpenDyslexic',sans-serif" font-size="12" fill="#607080">Epoxy keel · install spar bracket · press-fit spars</text>
