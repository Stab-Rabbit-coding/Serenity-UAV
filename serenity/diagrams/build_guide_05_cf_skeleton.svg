<text x="781" y="246" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">1×</text>
<text x="800" y="246" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Loctite 638</text>
<rect x="760" y="286" width="416" height="192" rx="8" fill="#fffdf6" stroke="#607080" stroke-width="1.5"/>
