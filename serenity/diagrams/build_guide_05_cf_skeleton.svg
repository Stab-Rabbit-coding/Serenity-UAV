<text x="576" y="512" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="14" fill="#ffffff">🔴</text>
<text x="616" y="500" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#c62828">Loctite 638</text>
<text x="616" y="514" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#607080">Spar tenon to bracket</text>
