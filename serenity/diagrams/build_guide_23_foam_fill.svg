<rect x="0" y="0" width="1200" height="900" rx="0" fill="#f5f0e8"/><rect x="0" y="0" width="1200" height="64" rx="0" fill="#006db7"/><text x="24" y="24" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">SERENITY-CLASS TILTROTOR UAV -- BUILD GUIDE</text><text x="24" y="46" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="11" fill="#c8dff0">Steve Griffing, PE(CSE), CISSP-ISSEP, CPP - CC BY 4.0 - 2026 - 18" / 457.2mm hull</text><rect x="1040" y="8" width="144" height="48" rx="6" fill="#ff7518"/><text x="1112" y="29" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#ffffff">STEP</text><text x="1112" y="50" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="22" font-weight="bold" fill="#ffffff">23 / 24</text><rect x="0" y="64" width="1200" height="40" rx="0" fill="#dde4ea"/><text x="24" y="90" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#006db7">PHASE 3 -- FOAM FILL + CURE</text><rect x="16" y="112" width="720" height="752" rx="8" fill="#fffdf6" stroke="#dde4ea" stroke-width="1"/><rect x="752" y="112" width="432" height="752" rx="8" fill="#fffdf6" stroke="#dde4ea" stroke-width="1"/><text x="356" y="148" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="13" font-weight="bold" fill="#006db7">SEQUENTIAL POUR STRATEGY -- FORE TO AFT</text><rect x="60" y="155" width="90" height="110" rx="8" fill="#c0392b33" stroke="#c0392b" stroke-width="2"/><rect x="80" y="175" width="50" height="70" rx="4" fill="#c0392b88"/><text x="105" y="284" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#c0392b">BATCH 1</text><text x="105" y="298" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#c0392b">110mL</text><text x="105" y="316" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#555">Zones A+B</text><line x1="150" y1="210" x2="230" y2="210" stroke="#888" stroke-width="1" stroke-dasharray="4 2"/><text x="190" y="206" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#888">3 min</text><rect x="230" y="155" width="90" height="110" rx="8" fill="#27ae6033" stroke="#27ae60" stroke-width="2"/><rect x="250" y="175" width="50" height="70" rx="4" fill="#27ae6088"/><text x="275" y="284" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#27ae60">BATCH 2</text><text x="275" y="298" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#27ae60">110mL</text><text x="275" y="316" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#555">Zones C+D</text><line x1="320" y1="210" x2="400" y2="210" stroke="#888" stroke-width="1" stroke-dasharray="4 2"/><text x="360" y="206" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#888">3 min</text><rect x="400" y="155" width="90" height="110" rx="8" fill="#e67e2233" stroke="#e67e22" stroke-width="2"/><rect x="420" y="175" width="50" height="70" rx="4" fill="#e67e2288"/><text x="445" y="284" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#e67e22">BATCH 3</text><text x="445" y="298" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#e67e22">110mL</text><text x="445" y="316" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#555">Zone E only</text><rect x="80" y="368" width="38" height="38" rx="4" fill="#fff3cd" stroke="#e67e22" stroke-width="2"/><text x="99" y="392" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#e67e22">mix</text><text x="132" y="392" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="18" fill="#e67e22">-></text><rect x="155" y="348" width="90" height="72" rx="6" fill="#fff3cd" stroke="#e67e22" stroke-width="2"/><text x="200" y="390" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#e67e22">4x expanded</text><text x="99" y="420" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#555">~27mL</text><text x="200" y="420" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#555">~110mL foam</text><text x="265" y="380" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="11" fill="#222222">2-min pot life  |  max 60mL/batch  |  cure 24h</text><text x="265" y="398" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="11" fill="#222222">3 batches x 110mL = 330mL total  |  foam mass: 41.9g</text><rect x="36" y="450" width="680" height="28" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="52" y="464" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ff7518">!</text><text x="70" y="465" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Work outdoors or with ventilation -- PU foam releases CO2 and heat during cure</text><rect x="36" y="486" width="680" height="28" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="52" y="500" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ff7518">!</text><text x="70" y="501" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Pot life: 2 MINUTES from mixing -- have everything positioned BEFORE mixing each batch</text><rect x="36" y="522" width="680" height="28" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="52" y="536" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ff7518">!</text><text x="70" y="537" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">DO NOT mix more than 60mL per batch -- excess heat from large pours WILL warp PETG</text><rect x="36" y="558" width="680" height="26" rx="6" fill="#b2ebf2" stroke="#00838f" stroke-width="1"/><text x="46" y="573" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#00838f">i</text><text x="60" y="573" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Total foam: ~330mL = 3 batches. Foam mass in airframe: 41.9g. Hull total: 213g.</text><text x="50" y="604" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="12" font-weight="bold" fill="#222222">CURE SCHEDULE:</text><rect x="50" y="612" width="205" height="22" rx="4" fill="#e8f5e9" stroke="#27ae60" stroke-width="1"/><text x="152" y="627" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#27ae60">4h -- initial set (do not move)</text><rect x="265" y="612" width="205" height="22" rx="4" fill="#e3f2fd" stroke="#2980b9" stroke-width="1"/><text x="367" y="627" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#2980b9">12h -- safe to handle carefully</text><rect x="480" y="612" width="205" height="22" rx="4" fill="#fff3e0" stroke="#e67e22" stroke-width="1"/><text x="582" y="627" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#e67e22">24h -- full cure, void removal OK</text><rect x="760" y="120" width="416" height="22" rx="5" fill="#006db7"/><text x="968" y="135" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#ffffff">FOAM FILL INSTRUCTIONS</text><circle cx="772" cy="154" r="11" fill="#006db7"/><text x="772" y="158" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">1</text><text x="790" y="158" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Close and tape ALL hull joints EXCEPT dorsal-forward seam (leave 20mm gap)</text><circle cx="772" cy="180" r="11" fill="#006db7"/><text x="772" y="184" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">2</text><text x="790" y="184" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Lay hull belly-down on level surface -- verify with spirit level</text><circle cx="772" cy="206" r="11" fill="#006db7"/><text x="772" y="210" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">3</text><text x="790" y="210" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Pre-measure 6 cups: 55mL Part A + 55mL Part B each (110mL per cup)</text><circle cx="772" cy="232" r="11" fill="#c0392b"/><text x="772" y="236" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">4</text><text x="790" y="236" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Put on nitrile gloves + safety glasses -- PU foam irritant</text><circle cx="772" cy="258" r="11" fill="#006db7"/><text x="772" y="262" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">5</text><text x="790" y="262" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">BATCH 1: mix 55+55mL, stir 30sec, pour into nose (Zones A+B)</text><circle cx="772" cy="284" r="11" fill="#006db7"/><text x="772" y="288" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">6</text><text x="790" y="288" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Wait 3 minutes for Batch 1 to gel -- do not disturb hull</text><circle cx="772" cy="310" r="11" fill="#006db7"/><text x="772" y="314" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">7</text><text x="790" y="314" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">BATCH 2: mix 55+55mL, pour into mid-hull (Zones C+D)</text><circle cx="772" cy="336" r="11" fill="#006db7"/><text x="772" y="340" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">8</text><text x="790" y="340" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Wait 3 minutes for Batch 2 to gel</text><circle cx="772" cy="362" r="11" fill="#c0392b"/><text x="772" y="366" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">9</text><text x="790" y="366" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">BATCH 3: mix 55+55mL, pour into aft section (Zone E ONLY)</text><circle cx="772" cy="388" r="11" fill="#006db7"/><text x="772" y="392" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">10</text><text x="790" y="392" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Seal dorsal-forward seam with 50mm packing tape -- smooth firmly</text><circle cx="772" cy="414" r="11" fill="#006db7"/><text x="772" y="418" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">11</text><text x="790" y="418" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Do NOT move hull for 4 hours minimum (initial cure phase)</text><circle cx="772" cy="440" r="11" fill="#006db7"/><text x="772" y="444" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">12</text><text x="790" y="444" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">After 24h cure: remove toothpick pins from void formers</text><circle cx="772" cy="466" r="11" fill="#006db7"/><text x="772" y="470" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">13</text><text x="790" y="470" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Grip each void former, twist +-10deg, pull firmly (wax releases it)</text><circle cx="772" cy="492" r="11" fill="#006db7"/><text x="772" y="496" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">14</text><text x="790" y="496" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Trim foam flash flush with serrated knife (1-2mm below hull surface)</text><circle cx="772" cy="518" r="11" fill="#006db7"/><text x="772" y="522" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">15</text><text x="790" y="522" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Pull drawstring through each conduit -- verify all 6 are clear</text><rect x="760" y="560" width="416" height="26" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="776" y="574" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ff7518">!</text><text x="794" y="575" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Step 9: Zone F (bell 388-457mm) stays EMPTY</text><rect x="760" y="594" width="416" height="24" rx="6" fill="#b2ebf2" stroke="#00838f" stroke-width="1"/><text x="770" y="609" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#00838f">i</text><text x="784" y="609" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Step 13: wax allows release with twist+pull</text><rect x="760" y="626" width="416" height="24" rx="6" fill="#b2ebf2" stroke="#00838f" stroke-width="1"/><text x="770" y="641" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#00838f">i</text><text x="784" y="641" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Step 15: pull wire through each conduit to verify</text><rect x="0" y="872" width="1200" height="28" rx="0" fill="#006db7"/><text x="600" y="890" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#c8dff0">Hull: Peter Farell CC BY 4.0 - Nozzle: BamJr CC BY 4.0 - Visual: Firefly/Serenity (c) Joss Whedon/Mutant Enemy/Universal - Fan engineering work</text>
</svg>