<rect x="0" y="0" width="1200" height="900" rx="0" fill="#f5f0e8"/><rect x="0" y="0" width="1200" height="64" rx="0" fill="#006db7"/><text x="24" y="24" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">SERENITY-CLASS TILTROTOR UAV -- BUILD GUIDE</text><text x="24" y="46" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="11" fill="#c8dff0">Steve Griffing, PE(CSE), CISSP-ISSEP, CPP - CC BY 4.0 - 2026 - 18" / 457.2mm hull</text><rect x="1040" y="8" width="144" height="48" rx="6" fill="#ff7518"/><text x="1112" y="29" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#ffffff">STEP</text><text x="1112" y="50" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="22" font-weight="bold" fill="#ffffff">22 / 24</text><rect x="0" y="64" width="1200" height="40" rx="0" fill="#dde4ea"/><text x="24" y="90" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#006db7">PHASE 3 -- FOAM FILL PREPARATION: VOID FORMERS</text><rect x="16" y="112" width="720" height="752" rx="8" fill="#fffdf6" stroke="#dde4ea" stroke-width="1"/><rect x="752" y="112" width="432" height="752" rx="8" fill="#fffdf6" stroke="#dde4ea" stroke-width="1"/><text x="356" y="148" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="13" font-weight="bold" fill="#006db7">HULL VOID ZONES A-F + CONDUIT ROUTING (side view)</text><rect x="50.0" y="253" width="111.46106736657919" height="24" rx="3" fill="#c0392b44" stroke="#c0392b" stroke-width="2"/><text x="105.7305336832896" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#c0392b">A</text><rect x="161.4610673665792" y="237" width="90.63867016622919" height="56" rx="3" fill="#2980b944" stroke="#2980b9" stroke-width="2"/><text x="206.78040244969378" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#2980b9">B</text><rect x="245.97550306211724" y="231" width="111.46106736657919" height="68" rx="3" fill="#27ae6044" stroke="#27ae60" stroke-width="2"/><text x="301.70603674540683" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#27ae60">C</text><rect x="357.4365704286964" y="234" width="84.51443569553805" height="62" rx="3" fill="#8e44ad44" stroke="#8e44ad" stroke-width="2"/><text x="399.69378827646545" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#8e44ad">D</text><rect x="441.9510061242345" y="238" width="83.28958880139976" height="54" rx="3" fill="#e67e2244" stroke="#e67e22" stroke-width="2"/><text x="483.59580052493436" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#e67e22">E</text><rect x="525.2405949256342" y="246" width="84.51443569553805" height="38" rx="3" fill="#16a08544" stroke="#16a085" stroke-width="2"/><text x="567.4978127734032" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#16a085">F</text><line x1="50" y1="259" x2="610" y2="259" stroke="#e74c3c" stroke-width="2" stroke-dasharray="8 3"/><line x1="50" y1="267" x2="610" y2="267" stroke="#3498db" stroke-width="2" stroke-dasharray="8 3"/><line x1="50" y1="274" x2="610" y2="274" stroke="#f39c12" stroke-width="2" stroke-dasharray="8 3"/><line x1="50" y1="252" x2="610" y2="252" stroke="#9b59b6" stroke-width="2" stroke-dasharray="8 3"/><line x1="50" y1="281" x2="610" y2="281" stroke="#1abc9c" stroke-width="2" stroke-dasharray="8 3"/><line x1="50" y1="287" x2="610" y2="287" stroke="#e67e22" stroke-width="2" stroke-dasharray="8 3"/><line x1="50" y1="310" x2="610" y2="310" stroke="#607080" stroke-width="1"/><text x="330" y="323" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#607080">457.2mm (18.00")</text><text x="50" y="328" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#222222">CONDUIT ROUTING (5mm OD PTFE tube -- install BEFORE foam):</text><line x1="50" y1="346" x2="82" y2="346" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6 2"/><text x="88" y="350" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">CAN FD -- Port keel rail full length</text><line x1="50" y1="364" x2="82" y2="364" stroke="#3498db" stroke-width="2" stroke-dasharray="6 2"/><text x="88" y="368" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">RS-485 -- Starboard keel rail full length</text><line x1="50" y1="382" x2="82" y2="382" stroke="#f39c12" stroke-width="2" stroke-dasharray="6 2"/><text x="88" y="386" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">MIL-STD-1553 -- Dorsal centre spine full length</text><line x1="50" y1="400" x2="82" y2="400" stroke="#9b59b6" stroke-width="2" stroke-dasharray="6 2"/><text x="88" y="404" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">ETH-A -- Port side Node1 to COMPHAT-SWITCH</text><line x1="50" y1="418" x2="82" y2="418" stroke="#1abc9c" stroke-width="2" stroke-dasharray="6 2"/><text x="88" y="422" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">ETH-B -- Starboard side Node2 to COMPHAT-SWITCH</text><line x1="50" y1="436" x2="82" y2="436" stroke="#e67e22" stroke-width="2" stroke-dasharray="6 2"/><text x="88" y="440" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">PWR -- Belly centre battery to BEC to all nodes</text><rect x="36" y="440" width="680" height="22" rx="3" fill="#006db7"/><text x="50" y="455" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">PNL  STATION(mm)  VOID SIZE        MATERIAL                         FASTENER</text><rect x="36" y="462" width="680" height="28" rx="0" fill="#f8f8f8"/><rect x="36" y="462" width="28" height="28" rx="0" fill="#c0392b"/><text x="50" y="480" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="12" font-weight="bold" fill="#ffffff">A</text><text x="70" y="480" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">0-91</text><text x="160" y="480" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">50x30x86mm EPS</text><text x="370" y="480" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Waxed EPS + bayonet PETG frame</text><rect x="36" y="490" width="680" height="28" rx="0" fill="#ffffff"/><rect x="36" y="490" width="28" height="28" rx="0" fill="#2980b9"/><text x="50" y="508" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="12" font-weight="bold" fill="#ffffff">B</text><text x="70" y="508" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">91-165</text><text x="160" y="508" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">55x52x74mm EPS</text><text x="370" y="508" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Waxed EPS + M2.5x4 PETG frame</text><rect x="36" y="518" width="680" height="28" rx="0" fill="#f8f8f8"/><rect x="36" y="518" width="28" height="28" rx="0" fill="#27ae60"/><text x="50" y="536" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="12" font-weight="bold" fill="#ffffff">C</text><text x="70" y="536" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">160-251</text><text x="160" y="536" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">70x48x91mm EPS</text><text x="370" y="536" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Waxed EPS + hinge PETG frame</text><rect x="36" y="546" width="680" height="28" rx="0" fill="#ffffff"/><rect x="36" y="546" width="28" height="28" rx="0" fill="#8e44ad"/><text x="50" y="564" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="12" font-weight="bold" fill="#ffffff">D</text><text x="70" y="564" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">251-320</text><text x="160" y="564" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">55x47x69mm EPS</text><text x="370" y="564" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Waxed EPS + magnet x4 frame</text><rect x="36" y="574" width="680" height="28" rx="0" fill="#f8f8f8"/><rect x="36" y="574" width="28" height="28" rx="0" fill="#e67e22"/><text x="50" y="592" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="12" font-weight="bold" fill="#ffffff">E</text><text x="70" y="592" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">320-388</text><text x="160" y="592" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">50x42x68mm EPS</text><text x="370" y="592" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Waxed EPS + M2.5x4 PETG frame</text><rect x="36" y="602" width="680" height="28" rx="0" fill="#ffffff"/><rect x="36" y="602" width="28" height="28" rx="0" fill="#16a085"/><text x="50" y="620" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="12" font-weight="bold" fill="#ffffff">F</text><text x="70" y="620" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">388-457</text><text x="160" y="620" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">NO FOAM FILL</text><text x="370" y="620" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Bayonet PETG frame only -- open ba</text><rect x="36" y="638" width="680" height="28" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="52" y="652" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ff7518">!</text><text x="70" y="653" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Once foam is poured (Step 23) void formers are hard to remove -- verify ALL conduit routin</text><rect x="36" y="674" width="680" height="24" rx="6" fill="#b2ebf2" stroke="#00838f" stroke-width="1"/><text x="46" y="689" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#00838f">i</text><text x="60" y="689" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Zone F (engine bell 388-457mm) gets NO foam fill -- leave open for 40mm EDF access</text><rect x="760" y="120" width="416" height="22" rx="5" fill="#006db7"/><text x="968" y="135" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#ffffff">INSTRUCTIONS</text><circle cx="772" cy="154" r="11" fill="#006db7"/><text x="772" y="158" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">1</text><text x="790" y="158" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Bond access-panel frames into hull with 5-min epoxy -- 30min cure</text><circle cx="772" cy="181" r="11" fill="#006db7"/><text x="772" y="185" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">2</text><text x="790" y="185" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Cut EPS void formers A-E using craft knife + printed jig templates</text><circle cx="772" cy="208" r="11" fill="#006db7"/><text x="772" y="212" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">3</text><text x="790" y="212" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Formers must clear panel frames by >=5mm on all sides</text><circle cx="772" cy="235" r="11" fill="#006db7"/><text x="772" y="239" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">4</text><text x="790" y="239" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Apply 2 coats paste wax to ALL void-former surfaces -- buff, 15min dry</text><circle cx="772" cy="262" r="11" fill="#006db7"/><text x="772" y="266" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">5</text><text x="790" y="266" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Do NOT wax the PTFE conduit tubes (bonding to foam is fine)</text><circle cx="772" cy="289" r="11" fill="#006db7"/><text x="772" y="293" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">6</text><text x="790" y="293" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Feed 6x PTFE conduit tubes nose-to-tail through hull before formers</text><circle cx="772" cy="316" r="11" fill="#006db7"/><text x="772" y="320" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">7</text><text x="790" y="320" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Label each conduit BOTH ends: CAN/RS485/1553/ETH-A/ETH-B/PWR</text><circle cx="772" cy="343" r="11" fill="#006db7"/><text x="772" y="347" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">8</text><text x="790" y="347" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Insert void formers A-E through open dorsal-forward seam</text><circle cx="772" cy="370" r="11" fill="#006db7"/><text x="772" y="374" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">9</text><text x="790" y="374" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Secure each former with 2x toothpick pins into hull ribs</text><circle cx="772" cy="397" r="11" fill="#006db7"/><text x="772" y="401" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">10</text><text x="790" y="401" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Apply 3M 4016 gasket strip around all panel frame lips</text><circle cx="772" cy="424" r="11" fill="#006db7"/><text x="772" y="428" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">11</text><text x="790" y="428" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Test-fit all access panel lids -- must close flush (0.2mm gap OK)</text><circle cx="772" cy="451" r="11" fill="#006db7"/><text x="772" y="455" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">12</text><text x="790" y="455" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Zone F stays empty -- no void former needed in engine bell</text><rect x="760" y="468" width="416" height="22" rx="5" fill="#607080"/><text x="968" y="483" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#ffffff">PARTS NEEDED</text><rect x="760" y="496" width="26" height="16" rx="4" fill="#607080"/><text x="773" y="508" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1x</text><text x="792" y="508" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">EPS foam board 25mm x 300mm x 150mm (Foamular 150)</text><rect x="760" y="518" width="26" height="16" rx="4" fill="#607080"/><text x="773" y="530" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1x</text><text x="792" y="530" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Johnson Paste Wax 16oz tin</text><rect x="760" y="540" width="26" height="16" rx="4" fill="#607080"/><text x="773" y="552" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">6x</text><text x="792" y="552" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">PTFE tube 5mm OD x 500mm per conduit</text><rect x="760" y="562" width="26" height="16" rx="4" fill="#2980b9"/><text x="773" y="574" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">16x</text><text x="792" y="574" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">M2.5x6 SS button-head (panels B and E)</text><rect x="760" y="584" width="26" height="16" rx="4" fill="#8e44ad"/><text x="773" y="596" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">8x</text><text x="792" y="596" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">N42 disc magnets 6x2mm (panel D)</text><rect x="760" y="606" width="26" height="16" rx="4" fill="#27ae60"/><text x="773" y="618" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1x</text><text x="792" y="618" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">3M 4016 closed-cell gasket tape roll</text><rect x="760" y="628" width="26" height="16" rx="4" fill="#607080"/><text x="773" y="640" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1x</text><text x="792" y="640" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">5-minute epoxy 25mL syringe</text><rect x="760" y="650" width="26" height="16" rx="4" fill="#607080"/><text x="773" y="662" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1x</text><text x="792" y="662" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Toothpicks (temporary void former pins)</text><rect x="0" y="872" width="1200" height="28" rx="0" fill="#006db7"/><text x="600" y="890" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#c8dff0">Hull: Peter Farell CC BY 4.0 - Nozzle: BamJr CC BY 4.0 - Visual: Firefly/Serenity (c) Joss Whedon/Mutant Enemy/Universal - Fan engineering work</text>
