<text x="776" y="401" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">6</text>
<text x="792" y="402" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Run apt install and pip3 install commands shown below</text>
