<text x="541" y="402" font-family="'OpenDyslexic',sans-serif" font-size="8" fill="#ff7518">RPi OS Lite 64-bit bookworm</text>
<rect x="56" y="568" width="700" height="120" rx="6" fill="#1e1e2e" stroke="#006db7" stroke-width="1.5"/>
<text x="66" y="584" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="9" fill="#2e7d32">$ CM4 first-boot commands (SSH in after flash)</text>
<text x="68" y="600" font-family="'OpenDyslexic',sans-serif" font-size="8.5" fill="#2e7d32" >sudo apt install mavlink-router python3-pip tpm2-tools tpm2-tss</text>
<text x="68" y="618" font-family="'OpenDyslexic',sans-serif" font-size="8.5" fill="#f5c518" >pip3 install mavsdk pymavlink python-can dronecan</text>
<text x="68" y="636" font-family="'OpenDyslexic',sans-serif" font-size="8.5" fill="#c8dff0" >sudo raspi-config  # Enable SPI, I2C, SSH, CAN interfaces</text>
<text x="68" y="654" font-family="'OpenDyslexic',sans-serif" font-size="8.5" fill="#e1bee7" >tpm2_getcap properties-fixed  # Verify TPM detected</text>
<text x="68" y="672" font-family="'OpenDyslexic',sans-serif" font-size="8.5" fill="#c8e6c9" >systemctl enable mavlink-router  # Auto-start on boot</text>
