<text x="776" y="353" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">4</text>
<text x="792" y="354" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">rpi-imager Advanced: set hostname=serenity · enable SSH · set WiFi</text>
