<rect x="0" y="0" width="1200" height="900" rx="0" fill="#f5f0e8"/><rect x="0" y="0" width="1200" height="64" rx="0" fill="#006db7"/><text x="24" y="24" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">SERENITY-CLASS TILTROTOR UAV -- BUILD GUIDE</text><text x="24" y="46" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="11" fill="#c8dff0">Steve Griffing, PE(CSE), CISSP-ISSEP, CPP - CC BY 4.0 - 2026 - 18" / 609.6mm hull</text><rect x="1040" y="8" width="144" height="48" rx="6" fill="#ff7518"/><text x="1112" y="29" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#ffffff">STEP</text><text x="1112" y="50" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="22" font-weight="bold" fill="#ffffff">2 / 26</text><rect x="0" y="64" width="1200" height="40" rx="0" fill="#dde4ea"/><text x="24" y="90" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#006db7">PHASE 1 -- PRINT HULL SECTIONS + ACCESS PANEL FRAMES</text><rect x="16" y="112" width="720" height="752" rx="8" fill="#fffdf6" stroke="#dde4ea" stroke-width="1"/><rect x="752" y="112" width="432" height="752" rx="8" fill="#fffdf6" stroke="#dde4ea" stroke-width="1"/><text x="356" y="148" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="13" font-weight="bold" fill="#006db7">24" HULL -- ACCESS PANEL ZONES (side view)</text><rect x="50.0" y="278" width="123.40332458442697" height="24" rx="3" fill="#c0392b33" stroke="#c0392b" stroke-width="2"/><text x="111.70166229221348" y="295" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#c0392b">A</text><rect x="52.0" y="258" width="119.40332458442697" height="16" rx="3" fill="#c0392b" opacity="0.8"/><text x="111.70166229221348" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="8" fill="#ffffff">NOSE</text><rect x="173.40332458442697" y="262" width="100.3499562554681" height="56" rx="3" fill="#2980b933" stroke="#2980b9" stroke-width="2"/><text x="223.57830271216102" y="295" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#2980b9">B</text><rect x="175.40332458442697" y="242" width="96.3499562554681" height="16" rx="3" fill="#2980b9" opacity="0.8"/><text x="223.57830271216102" y="254" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="8" fill="#ffffff">DORSAL FWD</text><rect x="266.97287839020123" y="256" width="123.40332458442697" height="68" rx="3" fill="#27ae6033" stroke="#27ae60" stroke-width="2"/><text x="328.6745406824147" y="295" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#27ae60">C</text><rect x="268.97287839020123" y="236" width="119.40332458442697" height="16" rx="3" fill="#27ae60" opacity="0.8"/><text x="328.6745406824147" y="248" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="8" fill="#ffffff">BELLY</text><rect x="390.3762029746282" y="259" width="93.56955380577426" height="62" rx="3" fill="#8e44ad33" stroke="#8e44ad" stroke-width="2"/><text x="437.16097987751533" y="295" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#8e44ad">D</text><rect x="392.3762029746282" y="239" width="89.56955380577426" height="16" rx="3" fill="#8e44ad" opacity="0.8"/><text x="437.16097987751533" y="251" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="8" fill="#ffffff">DORSAL AFT</text><rect x="483.94575678040246" y="263" width="92.21347331583559" height="54" rx="3" fill="#e67e2233" stroke="#e67e22" stroke-width="2"/><text x="530.0524934383202" y="295" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#e67e22">E</text><rect x="485.94575678040246" y="243" width="88.21347331583559" height="16" rx="3" fill="#e67e22" opacity="0.8"/><text x="530.0524934383202" y="255" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="8" fill="#ffffff">AFT SVC</text><rect x="576.159230096238" y="271" width="93.56955380577426" height="38" rx="3" fill="#16a08533" stroke="#16a085" stroke-width="2"/><text x="622.9440069991251" y="295" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="15" font-weight="bold" fill="#16a085">F</text><rect x="578.159230096238" y="251" width="89.56955380577426" height="16" rx="3" fill="#16a085" opacity="0.8"/><text x="622.9440069991251" y="263" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="8" fill="#ffffff">ENGINE</text><rect x="50" y="340" width="98" height="18" rx="3" fill="#c0392b"/><text x="99" y="353" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#ffffff">A  NOSE</text><rect x="155" y="340" width="98" height="18" rx="3" fill="#2980b9"/><text x="204" y="353" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#ffffff">B  DORSAL FWD</text><rect x="260" y="340" width="98" height="18" rx="3" fill="#27ae60"/><text x="309" y="353" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#ffffff">C  BELLY</text><rect x="365" y="340" width="98" height="18" rx="3" fill="#8e44ad"/><text x="414" y="353" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#ffffff">D  DORSAL AFT</text><rect x="470" y="340" width="98" height="18" rx="3" fill="#e67e22"/><text x="519" y="353" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#ffffff">E  AFT SVC</text><rect x="575" y="340" width="98" height="18" rx="3" fill="#16a085"/><text x="624" y="353" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#ffffff">F  ENGINE</text><line x1="50" y1="370" x2="670" y2="370" stroke="#607080" stroke-width="1"/><text x="360" y="385" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#607080">457.2 mm (24.00") total hull length</text><text x="50" y="410" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Total estimated print time: ~38 hours (run hull sections overnight)</text><text x="50" y="428" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Access frames + lids: ~4 hours (small parts, 6 each)</text><text x="50" y="446" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Total PETG consumed: ~285g hull + ~32g frames/lids = ~317g</text><rect x="50" y="464" width="636" height="32" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="66" y="478" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ff7518">!</text><text x="84" y="479" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Do NOT bond cockpit cap, engine bell, OR access-panel frames permanently until void former</text><rect x="50" y="504" width="636" height="26" rx="6" fill="#b2ebf2" stroke="#00838f" stroke-width="1"/><text x="60" y="519" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#00838f">i</text><text x="74" y="519" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Bond access-panel frames into hull with 5-min epoxy BEFORE foam pour. Frames stay; lids are rem</text><rect x="760" y="120" width="416" height="28" rx="5" fill="#006db7"/><text x="968" y="139" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#ffffff">PARTS NEEDED</text><rect x="760" y="155" width="26" height="16" rx="4" fill="#2e7d32"/><text x="773" y="167" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">6x</text><text x="792" y="167" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Hull STL sections (PETG 1.2mm wall)</text><rect x="760" y="177" width="26" height="16" rx="4" fill="#ff7518"/><text x="773" y="189" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">6x</text><text x="792" y="189" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Access-panel FRAME STLs (PETG 100%)</text><rect x="760" y="199" width="26" height="16" rx="4" fill="#ff7518"/><text x="773" y="211" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">6x</text><text x="792" y="211" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Access-panel LID STLs (PETG 100%)</text><rect x="760" y="221" width="26" height="16" rx="4" fill="#607080"/><text x="773" y="233" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">3x</text><text x="792" y="233" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Void-former jig STLs (PLA 15%)</text><rect x="760" y="243" width="26" height="16" rx="4" fill="#607080"/><text x="773" y="255" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1x</text><text x="792" y="255" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">PETG filament >= 300g</text><rect x="760" y="265" width="26" height="16" rx="4" fill="#607080"/><text x="773" y="277" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" font-weight="bold" fill="#ffffff">1x</text><text x="792" y="277" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">5-min epoxy 25mL syringe</text><rect x="760" y="285" width="416" height="28" rx="5" fill="#607080"/><text x="968" y="304" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#ffffff">PRINT INSTRUCTIONS</text><circle cx="772" cy="328" r="11" fill="#006db7"/><text x="772" y="332" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">1</text><text x="790" y="332" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Slice hull sections: 8% gyroid, 2 perimeters, 0.20mm layer</text><circle cx="772" cy="356" r="11" fill="#006db7"/><text x="772" y="360" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">2</text><text x="790" y="360" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Enable seam alignment to dorsal ridge on all sections</text><circle cx="772" cy="384" r="11" fill="#006db7"/><text x="772" y="388" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">3</text><text x="790" y="388" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Print cockpit cap + section nose-down (best bridging geometry)</text><circle cx="772" cy="412" r="11" fill="#006db7"/><text x="772" y="416" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">4</text><text x="790" y="416" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Print mid-hull as LEFT + RIGHT halves (centreline split for bed)</text><circle cx="772" cy="440" r="11" fill="#006db7"/><text x="772" y="444" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">5</text><text x="790" y="444" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Print aft neck vertically - preserves strength at 22.9mm thin section</text><circle cx="772" cy="468" r="11" fill="#006db7"/><text x="772" y="472" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">6</text><text x="790" y="472" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Print engine bell: 3 walls, 20% infill (airtight EDF duct needed)</text><circle cx="772" cy="496" r="11" fill="#006db7"/><text x="772" y="500" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">7</text><text x="790" y="500" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Print 6 access-panel FRAMES: 4 perimeters, 100% infill, flush face</text><circle cx="772" cy="524" r="11" fill="#006db7"/><text x="772" y="528" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">8</text><text x="790" y="528" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Print 6 access-panel LIDS: 4 perimeters, 100% infill, -0.2mm XY comp</text><circle cx="772" cy="552" r="11" fill="#006db7"/><text x="772" y="556" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">9</text><text x="790" y="556" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Print 3 void-former plug jigs (nose/mid/aft) - PLA 15% infill OK</text><rect x="0" y="872" width="1200" height="28" rx="0" fill="#006db7"/><text x="600" y="890" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#c8dff0">Hull: Peter Farell CC BY 4.0 - Nozzle: BamJr CC BY 4.0 - Visual: Firefly/Serenity (c) Joss Whedon/Mutant Enemy/Universal - Fan engineering work</text>
