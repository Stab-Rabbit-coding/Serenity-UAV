<circle cx="776" cy="299" r="9" fill="#006db7"/>
<text x="776" y="303" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">1</text>
<text x="792" y="304" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Install EDF2 (downstream): slide from nozzle end, seat at Z=5mm shoulder</text>
<circle cx="776" cy="323" r="9" fill="#006db7"/>
<text x="776" y="327" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">2</text>
<text x="792" y="328" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Apply 3 dabs structural epoxy at EDF2 casing at Z=50mm stator shoulder</text>
<circle cx="776" cy="347" r="9" fill="#006db7"/>
<text x="776" y="351" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">3</text>
<text x="792" y="352" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Install EDF1 (upstream): slide from intake end, seat at Z=76mm shoulder</text>
<circle cx="776" cy="371" r="9" fill="#006db7"/>
<text x="776" y="375" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">4</text>
<text x="792" y="376" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Apply 3 dabs structural epoxy at EDF1 casing at Z=76mm shoulder</text>
<circle cx="776" cy="395" r="9" fill="#006db7"/>
<text x="776" y="399" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">5</text>
<text x="792" y="400" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Route motor leads through hub bore (16mm ID); bundle in wire sleeve</text>
<circle cx="776" cy="419" r="9" fill="#006db7"/>
<text x="776" y="423" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">6</text>
<text x="792" y="424" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Solder WS2812C-2020 LED into nacelle tip cap recess</text>
<circle cx="776" cy="443" r="9" fill="#006db7"/>
<text x="776" y="447" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">7</text>
<text x="792" y="448" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Apply 5-minute epoxy bead over LED · seal for moisture</text>
<rect x="760" y="492" width="416" height="32" rx="6" fill="#b2ebf2" stroke="#00838f" stroke-width="1.5"/><text x="770" y="506" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#00838f">ℹ</text><text x="786" y="512" font-family="'OpenDyslexic',sans-serif" font-size="9.5" fill="#222222">Port = RED · Stbd = GREEN · 14 CFR 91.209 · LED in tip cap via D-section NAV_CONDUIT</text>
