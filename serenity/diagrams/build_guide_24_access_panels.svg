<rect x="0" y="0" width="1200" height="900" rx="0" fill="#f5f0e8"/><rect x="0" y="0" width="1200" height="64" rx="0" fill="#006db7"/><text x="24" y="24" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">SERENITY-CLASS TILTROTOR UAV -- BUILD GUIDE</text><text x="24" y="46" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="11" fill="#c8dff0">Steve Griffing, PE(CSE), CISSP-ISSEP, CPP - CC BY 4.0 - 2026 - 18" / 609.6mm hull</text><rect x="1040" y="8" width="144" height="48" rx="6" fill="#ff7518"/><text x="1112" y="29" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="11" font-weight="bold" fill="#ffffff">STEP</text><text x="1112" y="50" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="22" font-weight="bold" fill="#ffffff">24 / 26</text><rect x="0" y="64" width="1200" height="40" rx="0" fill="#dde4ea"/><text x="24" y="90" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#006db7">PHASE 3 -- ACCESS PANELS + MAINTENANCE MAP</text><rect x="16" y="112" width="720" height="752" rx="8" fill="#fffdf6" stroke="#dde4ea" stroke-width="1"/><rect x="752" y="112" width="432" height="752" rx="8" fill="#fffdf6" stroke="#dde4ea" stroke-width="1"/><text x="356" y="148" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="13" font-weight="bold" fill="#006db7">MAINTENANCE ACCESS MAP -- TOP VIEW</text><polygon points="50,265 90,242 200,228 310,225 380,230 445,240 545,265 445,290 380,300 310,305 200,302 90,288" fill="#e8e8e8" stroke="#607080" stroke-width="2"/><rect x="50" y="244" width="38" height="42" rx="4" fill="#c0392b55" stroke="#c0392b" stroke-width="2" stroke-dasharray="7 3"/><text x="69" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#c0392b">A</text><rect x="92" y="230" width="108" height="70" rx="4" fill="#2980b955" stroke="#2980b9" stroke-width="2" stroke-dasharray="7 3"/><text x="146" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#2980b9">B</text><rect x="202" y="228" width="108" height="74" rx="4" fill="#27ae6055" stroke="#27ae60" stroke-width="2" stroke-dasharray="7 3"/><text x="256" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#27ae60">C</text><rect x="312" y="228" width="68" height="74" rx="4" fill="#8e44ad55" stroke="#8e44ad" stroke-width="2" stroke-dasharray="7 3"/><text x="346" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#8e44ad">D</text><rect x="382" y="232" width="63" height="66" rx="4" fill="#e67e2255" stroke="#e67e22" stroke-width="2" stroke-dasharray="7 3"/><text x="413" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#e67e22">E</text><rect x="447" y="242" width="96" height="46" rx="4" fill="#16a08555" stroke="#16a085" stroke-width="2" stroke-dasharray="7 3"/><text x="495" y="270" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="16" font-weight="bold" fill="#16a085">F</text><ellipse cx="295" cy="192" rx="32" ry="20" fill="#cccccc" stroke="#888" stroke-width="1.5"/><text x="295" y="197" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#555">NACELLE</text><ellipse cx="295" cy="338" rx="32" ry="20" fill="#cccccc" stroke="#888" stroke-width="1.5"/><text x="295" y="343" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#555">NACELLE</text><text x="50" y="392" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="12" font-weight="bold" fill="#c0392b">MANDATORY: REMOVE BATTERY AND POWER OFF BEFORE OPENING ANY PANEL</text><text x="50" y="410" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#607080">Recommended sequence: F -> E -> D -> B -> A -> C (aft to forward, avoids cable strain)</text><rect x="36" y="428" width="680" height="33" rx="4" fill="#c0392b11" stroke="#c0392b55" stroke-width="1"/><rect x="36" y="428" width="28" height="33" rx="4" fill="#c0392b"/><text x="50" y="448" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">A</text><text x="70" y="441" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#c0392b">Nose bayonet:</text><text x="70" y="455" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Grip nose, rotate CCW 30deg, pull fwd. Install: align 3 tabs, push, rotate CW to clic</text><rect x="36" y="465" width="680" height="33" rx="4" fill="#2980b911" stroke="#2980b955" stroke-width="1"/><rect x="36" y="465" width="28" height="33" rx="4" fill="#2980b9"/><text x="50" y="485" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">B</text><text x="70" y="478" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#2980b9">Dorsal fwd screws:</text><text x="70" y="492" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">4x M2.5 Phillips. Store screws in lid thread holes when panel is open.</text><rect x="36" y="502" width="680" height="33" rx="4" fill="#27ae6011" stroke="#27ae6055" stroke-width="1"/><rect x="36" y="502" width="28" height="33" rx="4" fill="#27ae60"/><text x="50" y="522" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">C</text><text x="70" y="515" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#27ae60">Cargo belly hinge:</text><text x="70" y="529" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Use GCS / stick command to actuate release servo before maintenance access.</text><rect x="36" y="539" width="680" height="33" rx="4" fill="#8e44ad11" stroke="#8e44ad55" stroke-width="1"/><rect x="36" y="539" width="28" height="33" rx="4" fill="#8e44ad"/><text x="50" y="559" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">D</text><text x="70" y="552" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#8e44ad">Dorsal aft magnets:</text><text x="70" y="566" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Lift from forward edge first -- magnets release sequentially. Rear edge first to re-i</text><rect x="36" y="576" width="680" height="33" rx="4" fill="#e67e2211" stroke="#e67e2255" stroke-width="1"/><rect x="36" y="576" width="28" height="33" rx="4" fill="#e67e22"/><text x="50" y="596" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">E</text><text x="70" y="589" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#e67e22">Aft service screws:</text><text x="70" y="603" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">4x M2.5 Phillips. Need 50mm clearance above hull for panel lid removal.</text><rect x="36" y="613" width="680" height="33" rx="4" fill="#16a08511" stroke="#16a08555" stroke-width="1"/><rect x="36" y="613" width="28" height="33" rx="4" fill="#16a085"/><text x="50" y="633" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ffffff">F</text><text x="70" y="626" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#16a085">Engine bell bayonet:</text><text x="70" y="640" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#222222">Grip bell, rotate CW 30deg, pull aft. ESC pogo-pin connector auto-disconnects.</text><rect x="36" y="654" width="680" height="38" rx="6" fill="#b2ebf2" stroke="#00838f" stroke-width="1"/><text x="46" y="669" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#00838f">i</text><text x="60" y="669" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Node replacement: each SENSORHAT+CM4 stack slides on 2x PTFE rails -- disconnect JST-GH harness</text><rect x="36" y="700" width="680" height="26" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="52" y="714" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="14" font-weight="bold" fill="#ff7518">!</text><text x="70" y="715" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">NEVER force a panel -- paste wax residue causes initial adhesion. Use plastic pry tool onl</text><rect x="760" y="120" width="416" height="112" rx="5" fill="#c0392b11" stroke="#c0392b" stroke-width="2"/><rect x="760" y="120" width="416" height="22" rx="5" fill="#c0392b"/><rect x="760" y="135" width="416" height="7" rx="0" fill="#c0392b"/><text x="968" y="135" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">PANEL A -- NOSE CAP  [55mm OD]  Bayonet CCW 30deg</text><text x="772" y="158" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Node 1 SENSORHAT+CM4</text><text x="772" y="180" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- GPS patch antenna</text><text x="772" y="202" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Pitot tube fitting</text><rect x="760" y="238" width="416" height="112" rx="5" fill="#2980b911" stroke="#2980b9" stroke-width="2"/><rect x="760" y="238" width="416" height="22" rx="5" fill="#2980b9"/><rect x="760" y="253" width="416" height="7" rx="0" fill="#2980b9"/><text x="968" y="253" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">PANEL B -- DORSAL FWD  [65x60mm]  4x M2.5 Phillips</text><text x="772" y="276" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Node 2 SENSORHAT+CM4</text><text x="772" y="298" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Power distribution PCB</text><text x="772" y="320" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Pitot line</text><rect x="760" y="356" width="416" height="112" rx="5" fill="#27ae6011" stroke="#27ae60" stroke-width="2"/><rect x="760" y="356" width="416" height="22" rx="5" fill="#27ae60"/><rect x="760" y="371" width="416" height="7" rx="0" fill="#27ae60"/><text x="968" y="371" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">PANEL C -- CARGO BELLY  [80x55mm]  Hinge + servo latch</text><text x="772" y="394" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Winch motor+spool</text><text x="772" y="416" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Payload release servo</text><text x="772" y="438" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Downward FPV camera</text><rect x="760" y="474" width="416" height="112" rx="5" fill="#8e44ad11" stroke="#8e44ad" stroke-width="2"/><rect x="760" y="474" width="416" height="22" rx="5" fill="#8e44ad"/><rect x="760" y="489" width="416" height="7" rx="0" fill="#8e44ad"/><text x="968" y="489" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">PANEL D -- DORSAL AFT  [65x55mm]  4x N42 magnets</text><text x="772" y="512" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Node 3 SENSORHAT+CM4</text><text x="772" y="534" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Battery slide rail+XT60</text><text x="772" y="556" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Main 5V BEC</text><rect x="760" y="592" width="416" height="112" rx="5" fill="#e67e2211" stroke="#e67e22" stroke-width="2"/><rect x="760" y="592" width="416" height="22" rx="5" fill="#e67e22"/><rect x="760" y="607" width="416" height="7" rx="0" fill="#e67e22"/><text x="968" y="607" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">PANEL E -- AFT SERVICE  [60x50mm]  4x M2.5 Phillips</text><text x="772" y="630" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Node 4 SENSORHAT+CM4</text><text x="772" y="652" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- 3x ESCs (50A,50A,25A)</text><text x="772" y="674" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Bus terminus connectors</text><rect x="760" y="710" width="416" height="112" rx="5" fill="#16a08511" stroke="#16a085" stroke-width="2"/><rect x="760" y="710" width="416" height="22" rx="5" fill="#16a085"/><rect x="760" y="725" width="416" height="7" rx="0" fill="#16a085"/><text x="968" y="725" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="10" font-weight="bold" fill="#ffffff">PANEL F -- ENGINE BELL  [50mm OD]  Bayonet CW 30deg</text><text x="772" y="748" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- 40mm EDF assembly</text><text x="772" y="770" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Variable nozzle servo</text><text x="772" y="792" text-anchor="start" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">- Fwd FPV camera conn.</text><rect x="0" y="872" width="1200" height="28" rx="0" fill="#006db7"/><text x="600" y="890" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-size="9" fill="#c8dff0">Hull: Peter Farell CC BY 4.0 - Nozzle: BamJr CC BY 4.0 - Visual: Firefly/Serenity (c) Joss Whedon/Mutant Enemy/Universal - Fan engineering work</text>
