<text x="968" y="239" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="11" fill="#ffffff">INSTRUCTIONS</text>
<circle cx="776" cy="255" r="9" fill="#006db7"/>
<text x="776" y="259" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">1</text>
<text x="792" y="260" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Plug Ethernet cable: TRIHAT-1 J3 → COMPHAT-1 J2 (purple cable)</text>
<circle cx="776" cy="279" r="9" fill="#006db7"/>
<text x="776" y="283" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">2</text>
<text x="792" y="284" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Route Ethernet along PORT keel spine · tie every 40mm</text>
<circle cx="776" cy="303" r="9" fill="#006db7"/>
<text x="776" y="307" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">3</text>
<text x="792" y="308" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Plug CAN FD cable: TRIHAT-1 J2 → COMPHAT-1 J1 (orange cable)</text>
<circle cx="776" cy="327" r="9" fill="#006db7"/>
<text x="776" y="331" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">4</text>
<text x="792" y="332" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Route CAN along STARBOARD keel spine · ≥20mm from Ethernet</text>
<circle cx="776" cy="351" r="9" fill="#006db7"/>
<text x="776" y="355" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">5</text>
<text x="792" y="356" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">TRIHAT-1: solder 120Ω termination bridge JP-T</text>
<circle cx="776" cy="375" r="9" fill="#006db7"/>
<text x="776" y="379" text-anchor="middle" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="10" fill="#ffffff">6</text>
<text x="792" y="380" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">COMPHAT-1: leave bridge JP-C OPEN (do not solder)</text>
<rect x="760" y="424" width="416" height="36" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="778" y="439" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="14" fill="#ff7518">⚠</text><text x="796" y="446" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">CAN bus WILL NOT work correctly if both or neither terminator is soldered</text>
<rect x="760" y="468" width="416" height="36" rx="6" fill="#fffac0" stroke="#ff7518" stroke-width="2"/><text x="778" y="483" font-family="'OpenDyslexic',sans-serif" font-weight="bold" font-size="14" fill="#ff7518">⚠</text><text x="796" y="490" font-family="'OpenDyslexic',sans-serif" font-size="10" fill="#222222">Twist CANH/CANL ≥25 turns/metre — pre-twist before inserting into JST-GH</text>
